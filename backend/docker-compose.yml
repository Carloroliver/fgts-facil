version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fgts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fgts
      POSTGRES_PASSWORD: fgts123
      POSTGRES_DB: fgtsfacil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fgts-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: fgts-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=fgtsfacil-evo-key-2026
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://fgts:fgts123@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_LOCAL_ENABLED=false
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
